name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # OIDC federation to AWS
  pull-requests: write  # terraform-plan PR comment

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  # Deployment targets that identify a specific AWS account are kept as
  # secrets (masked in logs). The deploy jobs are gated on the DEPLOY_ENABLED
  # variable instead — `secrets` cannot be referenced in a job-level `if:`.
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'monitoring-tflock' }}
  ARTIFACTS_BUCKET: ${{ secrets.ARTIFACTS_BUCKET }}
  DEPLOY_ROLE_ARN: ${{ secrets.DEPLOY_ROLE_ARN }}
  TF_VERSION: '1.15.2'
  LAMBDA_MAIN_NAME: ${{ vars.LAMBDA_MAIN_NAME || 'monitoring-main' }}
  LAMBDA_RETRY_NAME: ${{ vars.LAMBDA_RETRY_NAME || 'retry-poller' }}
  TF_VAR_artifacts_bucket_name: ${{ secrets.ARTIFACTS_BUCKET }}
  TF_VAR_ses_sender_email: ${{ vars.SES_SENDER_EMAIL || 'noreply@biscella.com' }}
  TF_VAR_bedrock_model_id: ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-opus-4-7' }}
  TF_VAR_eodhd_api_key: ${{ secrets.EODHD_KEY }}
  TF_VAR_marketaux_api_key: ${{ secrets.MARKETAUX_KEY }}
  TF_VAR_marketaux_recency_days_1d: ${{ vars.MARKETAUX_RECENCY_DAYS_1D || '7' }}
  TF_VAR_marketaux_recency_days_1w: ${{ vars.MARKETAUX_RECENCY_DAYS_1W || '30' }}

jobs:
  # --- Build + tests --------------------------------------------------------

  verify:
    name: mvn verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: mvn verify
        run: mvn -B -ntp clean verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload deployable jar
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: lambda-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7

  # --- Terraform: fmt + validate (always) -----------------------------------

  terraform-validate:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check (recursive)
        run: terraform fmt -check -recursive

      - name: terraform validate (bootstrap)
        working-directory: terraform/bootstrap
        run: |
          terraform init -backend=false
          terraform validate

      - name: terraform validate (main)
        working-directory: terraform/main
        run: |
          terraform init -backend=false
          terraform validate

  # --- Terraform plan on PRs (commented on the PR) --------------------------

  terraform-plan:
    name: terraform plan (main stack)
    if: github.event_name == 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    needs: [verify, terraform-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init (main)
        working-directory: terraform/main
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: terraform plan
        id: plan
        working-directory: terraform/main
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -lock-timeout=5m \
            | tee plan.txt
          {
            echo 'plan<<TFEOF'
            cat plan.txt
            echo 'TFEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`;
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n\n…(truncated)'
              : plan;
            const body = [
              '### Terraform plan (`terraform/main`)',
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # --- Deploy-gate notice: make a skipped deploy visible -------------------
  #
  # The AWS-touching jobs below are gated on `vars.DEPLOY_ENABLED == 'true'`.
  # A gated-out job is *skipped*, not failed — so without this job a push to
  # main where DEPLOY_ENABLED is unset shows an all-green run that deployed
  # nothing. This job always runs on push to main and emits a loud warning
  # in that case, so "green" is never silently mistaken for "deployed".

  deploy-status:
    name: deploy status notice
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report whether the deploy jobs will run
        env:
          DEPLOY_ENABLED: ${{ vars.DEPLOY_ENABLED }}
          ROLE_ARN: ${{ secrets.DEPLOY_ROLE_ARN }}
          STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          ARTIFACTS: ${{ secrets.ARTIFACTS_BUCKET }}
        run: |
          if [[ "$DEPLOY_ENABLED" != "true" ]]; then
            echo "::warning title=Deploy skipped::DEPLOY_ENABLED is not 'true' — terraform-apply and deploy-lambda did NOT run, nothing was deployed to AWS. A green run here means the build passed, not that the Lambda was updated. Set the DEPLOY_ENABLED repository variable to 'true' (see DEPLOY.md §4)."
            exit 0
          fi
          missing=()
          [[ -z "$ROLE_ARN" ]] && missing+=("DEPLOY_ROLE_ARN")
          [[ -z "$STATE_BUCKET" ]] && missing+=("TF_STATE_BUCKET")
          [[ -z "$ARTIFACTS" ]] && missing+=("ARTIFACTS_BUCKET")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning title=Deploy misconfigured::DEPLOY_ENABLED is 'true' but these required secrets are empty: ${missing[*]}. The deploy jobs will run and then fail — set the secrets (see DEPLOY.md §4)."
            exit 0
          fi
          echo "::notice title=Deploy enabled::DEPLOY_ENABLED=true and the deploy secrets are set — terraform-apply + deploy-lambda will run for this push."

  # --- AWS preflight (pre-apply): verify account-level preconditions --------
  #
  # These two checks confirm resources that Terraform can't create on its own
  # (Bedrock model access is a manual console request; SES identity DKIM
  # verification needs DNS records outside the stack). Run them BEFORE
  # terraform-apply so we fail fast on missing preconditions.

  aws-preflight-pre:
    name: aws preflight pre-apply (Bedrock + SES)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    needs: [verify, terraform-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bedrock model / inference profile exists
        env:
          MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-opus-4-7' }}
          SES_REGION: ${{ vars.SES_REGION || 'eu-central-1' }}
        run: |
          set -e
          echo "Looking up Bedrock model '$MODEL_ID' in region $AWS_REGION"
          if aws bedrock list-foundation-models --region "$AWS_REGION" \
               --query "modelSummaries[?modelId=='$MODEL_ID'].modelId" \
               --output text | grep -q .; then
            echo "::notice::Bedrock foundation-model $MODEL_ID present"
          elif aws bedrock list-inference-profiles --region "$AWS_REGION" \
               --query "inferenceProfileSummaries[?inferenceProfileId=='$MODEL_ID'].inferenceProfileId" \
               --output text | grep -q .; then
            echo "::notice::Bedrock inference-profile $MODEL_ID present"
          else
            echo "::error::Bedrock model/profile '$MODEL_ID' not found in $AWS_REGION."
            echo "::error::List available with: aws bedrock list-foundation-models / list-inference-profiles --region $AWS_REGION"
            exit 1
          fi

      # The step above only proves the model *exists* — list-foundation-models
      # returns every model regardless of subscription. Account-level model
      # access (an AWS Marketplace subscription, granted manually in the
      # Bedrock console per CLAUDE.md §12) is invisible to it. A model swap to
      # an un-subscribed model therefore passes this preflight but fails at
      # runtime with AccessDeniedException, silently queueing every alert.
      # A 1-token converse smoke call is the only reliable access check.
      - name: Bedrock model access is granted
        env:
          MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-opus-4-7' }}
        run: |
          echo "Smoke-testing converse on '$MODEL_ID' in $AWS_REGION"
          set +e
          ERR=$(aws bedrock-runtime converse \
            --region "$AWS_REGION" \
            --model-id "$MODEL_ID" \
            --messages '[{"role":"user","content":[{"text":"ping"}]}]' \
            --inference-config '{"maxTokens":1}' 2>&1 >/dev/null)
          RC=$?
          set -e
          if [[ $RC -eq 0 ]]; then
            echo "::notice::Bedrock converse succeeded — model access granted for $MODEL_ID"
          elif echo "$ERR" | grep -qiE 'access is denied|aws-marketplace'; then
            echo "::error::Bedrock model access is NOT granted for '$MODEL_ID' in $AWS_REGION."
            echo "::error::Grant it manually: AWS Console -> Bedrock -> $AWS_REGION -> Model access -> request access."
            echo "::error::This is an account-level Marketplace subscription Terraform cannot manage (CLAUDE.md §12)."
            echo "$ERR"
            exit 1
          elif echo "$ERR" | grep -qiE 'not authorized to perform'; then
            echo "::error::The CI deploy role lacks bedrock:Converse — this preflight cannot run."
            echo "::error::Add bedrock:Converse to gh-actions-monitoring-deploy in the bootstrap stack."
            echo "$ERR"
            exit 1
          elif echo "$ERR" | grep -qiE 'Throttling|TooManyRequests'; then
            echo "::warning::Bedrock throttled the smoke call — access looks granted; skipping hard check."
          else
            echo "::error::Bedrock converse smoke call failed for '$MODEL_ID':"
            echo "$ERR"
            exit 1
          fi

      - name: SES sender identity is verified
        env:
          SES_REGION: ${{ vars.SES_REGION || 'eu-central-1' }}
          SES_SENDER_EMAIL: ${{ vars.SES_SENDER_EMAIL || 'noreply@biscella.com' }}
        run: |
          set -e
          echo "Looking up SES identity '$SES_SENDER_EMAIL' in $SES_REGION"
          STATUS=$(aws sesv2 get-email-identity \
            --email-identity "$SES_SENDER_EMAIL" \
            --region "$SES_REGION" \
            --query 'VerifiedForSendingStatus' \
            --output text 2>/dev/null || echo "MISSING")
          if [[ "$STATUS" == "True" ]]; then
            echo "::notice::SES identity $SES_SENDER_EMAIL is verified"
          else
            echo "::error::SES identity '$SES_SENDER_EMAIL' in $SES_REGION not verified (status=$STATUS)."
            echo "::error::Verify via the SES console or aws sesv2 create-email-identity."
            exit 1
          fi

  # --- Terraform apply on push to main --------------------------------------

  terraform-apply:
    name: terraform apply (main stack)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    needs: [verify, terraform-validate, aws-preflight-pre]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: terraform/main
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: terraform apply
        working-directory: terraform/main
        run: terraform apply -auto-approve -input=false -lock-timeout=5m

  # --- AWS preflight (post-apply): verify Terraform-managed IAM grants ------
  #
  # The Lambda role's inline policy is 100% terraform-managed, so the IAM
  # policy-simulator check must run AFTER terraform-apply — otherwise a
  # legitimate iam.tf change blocks its own deployment (the live role is
  # stale until apply runs, but apply was gated on the stale role passing
  # the simulator). Gating deploy-lambda on this job keeps the original
  # safety value: if the freshly-applied policy still can't InvokeModel,
  # we refuse to publish a new Lambda version against it.

  aws-preflight-post:
    name: aws preflight post-apply (IAM simulator)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    needs: [terraform-apply]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: IAM policy simulator — Lambda role can invoke Bedrock
        env:
          MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'anthropic.claude-opus-4-7' }}
          LAMBDA_MAIN_NAME: ${{ env.LAMBDA_MAIN_NAME }}
        run: |
          set -euo pipefail

          ROLE_NAME="${LAMBDA_MAIN_NAME}-role"
          if ! ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text 2>&1); then
            echo "::error::aws iam get-role failed for $ROLE_NAME:"
            echo "$ROLE_ARN"
            exit 1
          fi
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          FM_ARN="arn:aws:bedrock:${AWS_REGION}::foundation-model/${MODEL_ID}"
          PROFILE_ARN="arn:aws:bedrock:${AWS_REGION}:${ACCOUNT_ID}:inference-profile/${MODEL_ID}"

          echo "Simulating bedrock:InvokeModel + bedrock:Converse against $ROLE_ARN"
          echo "  candidate resources:"
          echo "    - $FM_ARN"
          echo "    - $PROFILE_ARN"
          echo

          # simulate-principal-policy rejects bedrock:InvokeModel and
          # bedrock:Converse in the same request ("require different
          # authorization information"), so we run one call per action and
          # intersect the allowed resources. Pass condition: there exists
          # at least one ARN that allows BOTH actions — that's the same
          # ARN runtime will hit.
          simulate_one() {
            local action=$1
            aws iam simulate-principal-policy \
              --policy-source-arn "$ROLE_ARN" \
              --action-names "$action" \
              --resource-arns "$FM_ARN" "$PROFILE_ARN" \
              --output json 2>&1
          }

          allowed_for() {
            jq -r '.EvaluationResults[] | select(.EvalDecision == "allowed") | .EvalResourceName'
          }

          declare -A ALLOWED
          for action in bedrock:InvokeModel bedrock:Converse; do
            echo "--- $action"
            if ! RAW=$(simulate_one "$action"); then
              echo "::error::simulate-principal-policy CLI call failed for $action:"
              echo "$RAW"
              exit 1
            fi
            echo "$RAW" | jq -r '.EvaluationResults[] | "  \(.EvalDecision)\ton\t\(.EvalResourceName)"'
            ALLOWED[$action]=$(echo "$RAW" | allowed_for | sort -u)
          done

          COMMON=$(comm -12 \
            <(printf '%s\n' "${ALLOWED[bedrock:InvokeModel]}") \
            <(printf '%s\n' "${ALLOWED[bedrock:Converse]}"))
          # comm with empty inputs yields a single empty line; filter blanks.
          COMMON=$(printf '%s\n' "$COMMON" | sed '/^$/d')

          if [[ -n "$COMMON" ]]; then
            echo
            echo "::notice::Lambda role can do BOTH InvokeModel and Converse on:"
            printf '%s\n' "$COMMON" | sed 's/^/  - /'
            exit 0
          fi

          echo
          echo "::error::No ARN allows BOTH bedrock:InvokeModel and bedrock:Converse for $ROLE_ARN."
          echo "::error::Check terraform/main/iam.tf BedrockInvoke statement and the BEDROCK_MODEL_ID repo variable."
          exit 1

  # --- Lambda deploy: jar → S3 → update-function-code → publish → alias -----

  deploy-lambda:
    name: deploy lambda (jar → S3 → alias)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    needs: [terraform-apply, aws-preflight-post]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployable jar
        uses: actions/download-artifact@v4
        with:
          name: lambda-jar
          path: target/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve jar + S3 key
        id: jar
        run: |
          # Prefer the shaded uber-jar (Micronaut application package). Fall
          # back to whatever single jar is in target/ — fail loud if zero.
          shopt -s nullglob
          jars=( target/*-shaded.jar )
          if [[ ${#jars[@]} -eq 0 ]]; then
            jars=( target/*.jar )
          fi
          if [[ ${#jars[@]} -eq 0 ]]; then
            echo "::error::No jar in target/"
            exit 1
          fi
          jar="${jars[0]}"
          key="lambda/${GITHUB_SHA}/$(basename "$jar")"
          echo "jar=$jar" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Upload jar to S3
        run: |
          aws s3 cp "${{ steps.jar.outputs.jar }}" \
            "s3://${{ env.ARTIFACTS_BUCKET }}/${{ steps.jar.outputs.key }}"

      - name: Update + publish + alias both Lambdas
        run: |
          set -euo pipefail
          deploy_one() {
            local fn="$1"
            echo "::group::deploy $fn"

            aws lambda update-function-code \
              --function-name "$fn" \
              --s3-bucket "${{ env.ARTIFACTS_BUCKET }}" \
              --s3-key   "${{ steps.jar.outputs.key }}" \
              --no-cli-pager

            # Wait for the in-place update to settle before publishing —
            # otherwise publish-version sometimes 409s on "Update in progress".
            aws lambda wait function-updated --function-name "$fn"

            local version
            version=$(aws lambda publish-version \
              --function-name "$fn" \
              --description "deploy ${GITHUB_SHA}" \
              --query Version --output text \
              --no-cli-pager)
            echo "Published $fn version $version"

            aws lambda update-alias \
              --function-name "$fn" \
              --name live \
              --function-version "$version" \
              --no-cli-pager
            echo "::endgroup::"
          }

          deploy_one "${{ env.LAMBDA_MAIN_NAME }}"
          deploy_one "${{ env.LAMBDA_RETRY_NAME }}"
